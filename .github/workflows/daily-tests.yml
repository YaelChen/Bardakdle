name: UI Tests — ברדקדל

on:
  # כל יום בשעה 8:00 UTC (11:00 שעון ישראל בקיץ)
  schedule:
    - cron: '0 8 * * *'
  # בכל push ל-main
  push:
    branches: [main]

jobs:
  test:
    name: Playwright UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build project
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ ברדקדל — טסט UI נכשל (${{ github.event_name }})"
          to: ibexgrace@gmail.com
          from: ברדקדל Tests <${{ secrets.MAIL_USERNAME }}>
          body: |
            שלום,

            אחד מטסטי ה-UI של ברדקדל נכשל.

            📋 פרטים:
            • Workflow: ${{ github.workflow }}
            • Trigger: ${{ github.event_name }}
            • Branch: ${{ github.ref_name }}
            • Commit: ${{ github.sha }}

            🔗 לצפייה בפרטי הכשל:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            דו"ח מלא מצורף כ-artifact בקישור למעלה.
